name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (iOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Use the newest Xcode available on the runner
          XCODE=$(ls /Applications | grep 'Xcode_' | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project AtlasQuizApp/AtlasQuiz.xcodeproj \
            -scheme AtlasQuiz \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            -quiet

      - name: Confirm success
        run: echo "✅ Build succeeded"
